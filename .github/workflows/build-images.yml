name: Release Lakka

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-gamepad:
    uses: ./.github/workflows/build-gamepad.yml

  build-battery:
    uses: ./.github/workflows/build-battery.yml

  build-audio:
    uses: ./.github/workflows/build-audio.yml

  build-lcd:
    uses: ./.github/workflows/build-lcd.yml

  build-pcie:
    uses: ./.github/workflows/build-pcie.yml

  collect-artifacts:
    needs: [build-gamepad, build-battery, build-audio, build-lcd, build-pcie]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts

      - name: Flatten structure
        run: |
          mkdir -p drivers-bin
          
          # Gamepad
          mv artifacts/pspi-gamepad-bin/32bit/gamepad drivers-bin/gamepad_32
          mv artifacts/pspi-gamepad-bin/64bit/gamepad drivers-bin/gamepad_64
          
          # Battery
          mkdir -p drivers-bin/battery
          mv artifacts/pspi-battery-bin/32bit/battery_monitor drivers-bin/battery_monitor_32
          mv artifacts/pspi-battery-bin/64bit/battery_monitor drivers-bin/battery_monitor_64
          
          # Audio overlays
          mkdir -p drivers-bin/audio_overlays
          mv artifacts/pspi-audio-overlays/*.dtbo drivers-bin/audio_overlays/
          
          # LCD overlays
          mkdir -p drivers-bin/lcd_overlays
          mv artifacts/pspi-lcd-overlays/*.dtbo drivers-bin/lcd_overlays/
          
          # PCIe overlay
          mkdir -p drivers-bin/pcie_overlays
          mv artifacts/pspi-pcie-overlay/*.dtbo drivers-bin/pcie_overlays

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pspi-driver-binaries
          path: drivers-bin/

  build-images:
    needs: collect-artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download driver binaries
        uses: actions/download-artifact@v4
        with:
          name: pspi-driver-binaries
          path: drivers-bin/

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            p7zip-full \
            device-tree-compiler \
            git \
            wget \
            util-linux

      - name: Build images
        run: |
          sudo ./scripts/build-lakka.sh \
            --target arm \
            --version "${{ steps.version.outputs.version }}" \
            --driver-binaries "$(pwd)/drivers-bin"

      - name: Upload build artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: pspi-images-${{ steps.version.outputs.version }}
          path: completed_images/
          retention-days: 14

  release:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pspi-images-${{ steps.version.outputs.version }}
          path: completed_images/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          shopt -s nullglob
          gh release create "v${VERSION}" --draft --title "v${VERSION}" \
            completed_images/*.img.gz completed_images/*.img.gz.sha256 completed_images/*.7z.*
          shopt -u nullglob
