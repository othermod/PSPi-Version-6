name: Release Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0)'
        required: true
      distro:
        description: 'Single distro to build (optional, for testing)'
        required: false
      target:
        description: 'Single target to build (optional, for testing)'
        required: false

permissions:
  contents: write

jobs:
  build-gamepad:
    uses: ./.github/workflows/build-gamepad.yml

  build-battery:
    uses: ./.github/workflows/build-battery.yml

  build-rtc:
    uses: ./.github/workflows/build-rtc.yml

  build-firmware:
    uses: ./.github/workflows/build-firmware.yml

  build-atmega:
    uses: ./.github/workflows/build-atmega.yml

  build-audio:
    uses: ./.github/workflows/build-audio.yml

  build-lcd:
    uses: ./.github/workflows/build-lcd.yml

  build-pcie:
    uses: ./.github/workflows/build-pcie.yml

  collect-artifacts:
    needs: [build-gamepad, build-battery, build-rtc, build-firmware, build-atmega, build-audio, build-lcd, build-pcie]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: drivers-bin/
          merge-multiple: true

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pspi-driver-binaries
          path: drivers-bin/

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build matrix
        id: matrix
        run: |
          if [[ -n "${{ github.event.inputs.distro }}" && -n "${{ github.event.inputs.target }}" ]]; then
            matrix=$(jq -cn --arg d "${{ github.event.inputs.distro }}" --arg t "${{ github.event.inputs.target }}" '[{"distro": $d, "target": $t}]')
          else
            matrix='[]'
            for distro_file in scripts/distros/*.sh; do
              distro=$(basename "$distro_file" .sh)
              targets=$(bash -c "source '$distro_file' 2>/dev/null && echo \"\${ALL_TARGETS[*]}\"")
              if [[ -z "$targets" ]]; then
                echo "ERROR: No ALL_TARGETS found in $distro_file" >&2
                exit 1
              fi
              for target in $targets; do
                matrix=$(echo "$matrix" | jq --arg d "$distro" --arg t "$target" '. += [{"distro": $d, "target": $t}]')
              done
            done
          fi
          echo "matrix=$(echo "$matrix" | jq -c .)" >> "$GITHUB_OUTPUT"

  build-images:
    needs: [collect-artifacts, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download driver binaries
        uses: actions/download-artifact@v4
        with:
          name: pspi-driver-binaries
          path: drivers-bin/


      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#[vV]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            wget \
            util-linux

      - name: Populate workspace with built binaries
        run: |
          # firmware.sh's distro_post_patch references $PROJECT_ROOT/rpi/firmware/
          # and $PROJECT_ROOT/atmega/firmware/ directly rather than using
          # --driver-binaries, so we copy the pre-built artifacts there.
          mkdir -p rpi/firmware/32 rpi/firmware/64 atmega/firmware
          cp drivers-bin/rpi/firmware/32/update_firmware rpi/firmware/32/update_firmware
          cp drivers-bin/rpi/firmware/64/update_firmware rpi/firmware/64/update_firmware
          cp drivers-bin/atmega/firmware/firmware.hex    atmega/firmware/firmware.hex

      - name: Build image
        run: |
          sudo ./scripts/patcher.sh \
            --distro "${{ matrix.distro }}" \
            --version "${{ steps.version.outputs.version }}" \
            --driver-binaries "$(pwd)/drivers-bin/rpi" \
            --target "${{ matrix.target }}"

      - name: Upload build artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: pspi-images-${{ steps.version.outputs.version }}-${{ matrix.distro }}-${{ matrix.target }}
          path: completed_images/
          retention-days: 14

  package-binaries:
    needs: [collect-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Download driver binaries
        uses: actions/download-artifact@v4
        with:
          name: pspi-driver-binaries
          path: staging/


      - name: Package
        run: tar -czf pspi-binaries.tar.gz -C staging .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pspi-binaries
          path: pspi-binaries.tar.gz

  release:
    needs: [build-images, package-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#[vV]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pspi-images-${{ steps.version.outputs.version }}-*
          path: completed_images/
          merge-multiple: true

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: pspi-binaries
          path: release-assets/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          shopt -s nullglob
          mv release-assets/pspi-binaries.tar.gz release-assets/pspi-binaries-v${VERSION}.tar.gz
          gh release create "v${VERSION}" --draft --title "v${VERSION}" \
            completed_images/*.img.xz \
            release-assets/pspi-binaries-v${VERSION}.tar.gz \
            --repo "$GITHUB_REPOSITORY"
          shopt -u nullglob
